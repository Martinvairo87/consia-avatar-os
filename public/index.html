<!DOCTYPE html>
<html>
<head>
  <title>CONSIA ULTRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body{
      margin:0;
      background:black;
      overflow:hidden;
      font-family:Arial;
    }

    video{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    }

    canvas{
      position:absolute;
      z-index:2;
    }

    #ui{
      position:absolute;
      bottom:30px;
      width:100%;
      text-align:center;
      z-index:3;
    }

    button{
      padding:14px 28px;
      font-size:18px;
      background:#00ffc8;
      border:none;
      border-radius:12px;
    }
  </style>
</head>

<body>

<video autoplay muted loop>
  <source src="https://create-images-results.d-id.com/DefaultPresenters/Noelle.mp4">
</video>

<canvas id="face"></canvas>

<div id="ui">
  <button onclick="start()">Hablar</button>
</div>

<script>
const canvas = document.getElementById("face");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let analyser, dataArray;
let speaking = false;

async function start(){

  const input = prompt("CONSIA:");

  if(!input) return;

  // AUTO RESPUESTA (simulación IA local)
  const respuesta = generarRespuesta(input);

  const audio = new Audio(`https://consia-api.jbdkb7r94d.workers.dev/v1/tts?text=${encodeURIComponent(respuesta)}`);

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(audio);

  analyser = audioCtx.createAnalyser();
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  speaking = true;

  audio.play();

  animarCara();
}

function generarRespuesta(text){
  return "CONSIA responde: " + text;
}

function animarCara(){

  requestAnimationFrame(animarCara);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  let sum = dataArray.reduce((a,b)=>a+b,0);
  let volume = sum / dataArray.length;

  let cx = canvas.width/2;
  let cy = canvas.height*0.65;

  // BOCA
  ctx.fillStyle = "#00ffc8";
  ctx.beginPath();
  ctx.ellipse(cx, cy, 100, volume*0.5, 0, 0, Math.PI*2);
  ctx.fill();

  // OJOS
  let eyeY = canvas.height*0.45;
  let blink = Math.random() > 0.98 ? 2 : 12;

  ctx.fillStyle = "white";
  ctx.fillRect(cx-80, eyeY, 20, blink);
  ctx.fillRect(cx+60, eyeY, 20, blink);

  // EXPRESIÓN dinámica
  if(volume > 50){
    ctx.fillStyle = "rgba(0,255,200,0.2)";
    ctx.beginPath();
    ctx.arc(cx, cy, 180, 0, Math.PI*2);
    ctx.fill();
  }
}
</script>

</body>
</html>
