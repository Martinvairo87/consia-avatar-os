<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONSIA REALTIME V3</title>
<style>
  body{
    margin:0;
    background:#000;
    color:#00ffc8;
    font-family:Arial, sans-serif;
    overflow:hidden;
  }
  video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
  }
  canvas{
    position:absolute;
    inset:0;
    z-index:2;
  }
  #ui{
    position:absolute;
    left:0;
    right:0;
    bottom:22px;
    z-index:3;
    text-align:center;
  }
  input{
    width:min(90vw,760px);
    padding:12px;
    border:none;
    border-radius:10px;
    margin:0 auto 10px;
    display:block;
  }
  button{
    padding:14px 20px;
    margin:4px;
    font-size:16px;
    background:#00ffc8;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
  }
  #status{
    position:absolute;
    top:16px;
    left:16px;
    z-index:3;
    background:rgba(0,0,0,.55);
    color:#fff;
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
  }
  #log{
    position:absolute;
    top:16px;
    right:16px;
    width:min(42vw,420px);
    max-height:50vh;
    overflow:auto;
    z-index:3;
    background:rgba(0,0,0,.55);
    color:#fff;
    padding:10px 12px;
    border-radius:10px;
    font-size:12px;
    white-space:pre-wrap;
  }
  audio{ display:none; }
</style>
</head>
<body>

<video autoplay muted loop playsinline>
  <source src="https://create-images-results.d-id.com/DefaultPresenters/Noelle.mp4" type="video/mp4">
</video>

<canvas id="face"></canvas>
<audio id="remoteAudio" autoplay playsinline></audio>

<div id="status">READY</div>
<div id="log"></div>

<div id="ui">
  <input id="msg" placeholder="Escribí algo o conectá realtime..." />
  <button onclick="connectRealtime()">⚡ CONECTAR</button>
  <button onclick="sendText()">🚀 ENVIAR TEXTO</button>
  <button onclick="toggleMic()">🎤 MIC</button>
  <button onclick="toggleAuto()">🧠 AUTO</button>
  <button onclick="testStatus()">✅ TEST</button>
  <button onclick="disconnectRealtime()">⏹ STOP</button>
</div>

<script>
const API_BASE = "https://consia-api.jbdkb7r94d.workers.dev";

const canvas = document.getElementById("face");
const ctx = canvas.getContext("2d");
const msgEl = document.getElementById("msg");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const remoteAudioEl = document.getElementById("remoteAudio");

let pc = null;
let dc = null;
let localStream = null;
let autoMode = false;
let micEnabled = true;
let analyser = null;
let audioCtx = null;
let sourceNode = null;
let mouthLevel = 0;
let connected = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function setStatus(t){ statusEl.innerText = t; }
function log(t){
  logEl.innerText += t + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function drawFace(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width / 2;
  const eyeY = canvas.height * 0.45;
  const mouthY = canvas.height * 0.65;

  const blink = Math.random() > 0.986 ? 2 : 12;

  ctx.fillStyle = "white";
  ctx.fillRect(cx - 80, eyeY, 20, blink);
  ctx.fillRect(cx + 60, eyeY, 20, blink);

  ctx.fillStyle = "#00ffc8";
  ctx.beginPath();
  const mouthHeight = Math.max(8, mouthLevel * 90);
  ctx.ellipse(cx, mouthY, 95, mouthHeight, 0, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(drawFace);
}
drawFace();

async function testStatus(){
  try{
    const r = await fetch(API_BASE + "/v1/status");
    const j = await r.json();
    setStatus(j.ok ? "API OK" : "API ERROR");
    log(JSON.stringify(j, null, 2));
  }catch(e){
    setStatus("API ERROR");
    log(String(e));
  }
}

async function connectRealtime(){
  if (connected) return;

  setStatus("CONNECTING...");

  try{
    const sessionRes = await fetch(API_BASE + "/v1/realtime/session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({})
    });

    const sessionData = await sessionRes.json();
    if (!sessionRes.ok || !sessionData.ok) {
      setStatus("SESSION ERROR");
      log(JSON.stringify(sessionData, null, 2));
      return;
    }

    const ephemeralKey = sessionData.client_secret.value;
    const model = sessionData.model;

    pc = new RTCPeerConnection();
    dc = pc.createDataChannel("oai-events");

    dc.onopen = () => {
      connected = true;
      setStatus("CONNECTED");
      log("Realtime data channel open");
    };

    dc.onmessage = async (ev) => {
      try{
        const event = JSON.parse(ev.data);

        if (event.type === "error") {
          log("Realtime error: " + JSON.stringify(event.error || event));
        }

        if (event.type === "session.created" || event.type === "session.updated") {
          log(event.type);
        }

        if (event.type === "response.output_item.done" && event.item?.type === "function_call" && event.item?.name === "run_agent_action") {
          const args = JSON.parse(event.item.arguments || "{}");

          const toolRes = await fetch(API_BASE + "/v1/automation/dispatch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: args.action,
              payload: args.payload || {}
            })
          });

          const toolData = await toolRes.json();

          dc.send(JSON.stringify({
            type: "conversation.item.create",
            item: {
              type: "function_call_output",
              call_id: event.item.call_id,
              output: JSON.stringify(toolData)
            }
          }));

          dc.send(JSON.stringify({ type: "response.create" }));
        }
      }catch(err){
        log("DC parse error: " + err);
      }
    };

    pc.onconnectionstatechange = () => {
      log("pc.state=" + pc.connectionState);
      if (pc.connectionState === "disconnected" || pc.connectionState === "failed" || pc.connectionState === "closed") {
        connected = false;
        setStatus("DISCONNECTED");
      }
    };

    pc.ontrack = (event) => {
      remoteAudioEl.srcObject = event.streams[0];
      setupAudioAnalyser(event.streams[0]);
      setStatus("SPEAKING READY");
    };

    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    for (const track of localStream.getTracks()) {
      track.enabled = micEnabled;
      pc.addTrack(track, localStream);
    }

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const sdpRes = await fetch(`https://api.openai.com/v1/realtime?model=${encodeURIComponent(model)}`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${ephemeralKey}`,
        "Content-Type": "application/sdp"
      },
      body: offer.sdp
    });

    if (!sdpRes.ok) {
      const err = await sdpRes.text();
      throw new Error(err);
    }

    const answer = {
      type: "answer",
      sdp: await sdpRes.text()
    };

    await pc.setRemoteDescription(answer);
    setStatus("CONNECTED");
  }catch(err){
    setStatus("CONNECT ERROR");
    log(String(err));
  }
}

function setupAudioAnalyser(stream){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    sourceNode.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);
    function tick(){
      if (analyser){
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a,b)=>a+b,0) / data.length;
        mouthLevel = Math.max(0.08, avg / 255);
      } else {
        mouthLevel = 0;
      }
      requestAnimationFrame(tick);
    }
    tick();
  }catch(err){
    log("Analyser error: " + err);
  }
}

function sendText(){
  if (!dc || dc.readyState !== "open") {
    setStatus("NOT CONNECTED");
    return;
  }

  const text = msgEl.value.trim();
  if (!text) return;

  dc.send(JSON.stringify({
    type: "conversation.item.create",
    item: {
      type: "message",
      role: "user",
      content: [
        { type: "input_text", text }
      ]
    }
  }));

  dc.send(JSON.stringify({ type: "response.create" }));
  msgEl.value = "";
  setStatus("TEXT SENT");
}

function toggleMic(){
  micEnabled = !micEnabled;
  if (localStream){
    for (const track of localStream.getAudioTracks()) {
      track.enabled = micEnabled;
    }
  }
  setStatus(micEnabled ? "MIC ON" : "MIC OFF");
}

function toggleAuto(){
  autoMode = !autoMode;
  setStatus(autoMode ? "AUTO ON" : "AUTO OFF");
}

function disconnectRealtime(){
  connected = false;
  mouthLevel = 0;
  if (dc) { try{ dc.close(); }catch{} dc = null; }
  if (pc) { try{ pc.close(); }catch{} pc = null; }
  if (localStream) {
    for (const t of localStream.getTracks()) t.stop();
    localStream = null;
  }
  if (sourceNode) { try{ sourceNode.disconnect(); }catch{} sourceNode = null; }
  if (analyser) { try{ analyser.disconnect(); }catch{} analyser = null; }
  remoteAudioEl.srcObject = null;
  setStatus("READY");
}
</script>

</body>
</html>
