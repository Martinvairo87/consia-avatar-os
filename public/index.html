<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONSIA OWNER PANEL CRM V5</title>
<style>
  body{
    margin:0;
    background:#000;
    color:#00ffc8;
    font-family:Arial,sans-serif;
    overflow:hidden;
  }
  video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
  }
  canvas{
    position:absolute;
    inset:0;
    z-index:2;
  }
  #status{
    position:absolute;
    top:14px;
    left:14px;
    z-index:4;
    background:rgba(0,0,0,.55);
    color:#fff;
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
  }
  #panel{
    position:absolute;
    top:14px;
    right:14px;
    width:min(44vw,460px);
    max-height:92vh;
    overflow:auto;
    z-index:4;
    background:rgba(0,0,0,.68);
    color:#fff;
    padding:12px;
    border-radius:12px;
  }
  #panel h3{
    margin:0 0 10px 0;
    color:#00ffc8;
  }
  #ui{
    position:absolute;
    left:0;
    right:0;
    bottom:18px;
    z-index:4;
    text-align:center;
  }
  input, textarea{
    width:min(92vw,760px);
    padding:12px;
    margin:0 auto 10px;
    border:none;
    border-radius:10px;
    display:block;
    box-sizing:border-box;
  }
  button{
    padding:13px 18px;
    margin:4px;
    font-size:15px;
    background:#00ffc8;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
  }
  .small{
    font-size:12px;
    opacity:.85;
    margin-bottom:8px;
  }
  .card{
    background:rgba(255,255,255,.06);
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
  }
  .row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .row button{
    flex:1 1 auto;
  }
  .title{
    color:#00ffc8;
    font-weight:700;
    margin-bottom:6px;
  }
  pre{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:12px;
    margin:0;
  }
</style>
</head>
<body>

<video autoplay muted loop playsinline>
  <source src="https://create-images-results.d-id.com/DefaultPresenters/Noelle.mp4" type="video/mp4">
</video>

<canvas id="face"></canvas>
<audio id="remoteAudio" autoplay playsinline></audio>

<div id="status">READY</div>

<div id="panel">
  <h3>CONSIA OWNER PANEL CRM V5</h3>
  <div class="small" id="ownerStats">Cargando...</div>

  <div class="card">
    <div class="title">Acciones rápidas</div>
    <div class="row">
      <button onclick="runQuickAction('lead_qualify')">Lead</button>
      <button onclick="runQuickAction('followup_create')">Followup</button>
      <button onclick="runQuickAction('task_create')">Tarea</button>
      <button onclick="runQuickAction('property_match')">Propiedad</button>
      <button onclick="runQuickAction('meeting_summary')">Resumen</button>
    </div>
  </div>

  <div class="card">
    <div class="title">CRM rápido</div>
    <div class="row">
      <button onclick="crearLeadTest()">Crear Lead Test</button>
      <button onclick="listarLeads()">Leads</button>
      <button onclick="verPipeline()">Pipeline</button>
      <button onclick="crearFollowupTest()">Followup Test</button>
    </div>
  </div>

  <div class="card">
    <div class="title">Último resultado</div>
    <pre id="crmOutput">Sin datos</pre>
  </div>

  <div class="card">
    <div class="title">Historial automatizaciones</div>
    <div id="automationList"></div>
  </div>

  <div class="card">
    <div class="title">Leads</div>
    <div id="leadsList"></div>
  </div>
</div>

<div id="ui">
  <input id="msg" placeholder="Escribí algo o conectá realtime..." />
  <div class="row">
    <button onclick="connectRealtime()">⚡ CONECTAR</button>
    <button onclick="sendText()">🚀 ENVIAR TEXTO</button>
    <button onclick="toggleMic()">🎤 MIC</button>
    <button onclick="toggleAuto()">🧠 AUTO</button>
    <button onclick="testStatus()">✅ TEST</button>
    <button onclick="refreshOwnerPanel()">📊 PANEL</button>
    <button onclick="disconnectRealtime()">⏹ STOP</button>
  </div>
</div>

<script>
const API_BASE = "https://consia-api.jbdkb7r94d.workers.dev";

const canvas = document.getElementById("face");
const ctx = canvas.getContext("2d");
const msgEl = document.getElementById("msg");
const statusEl = document.getElementById("status");
const ownerStatsEl = document.getElementById("ownerStats");
const automationListEl = document.getElementById("automationList");
const leadsListEl = document.getElementById("leadsList");
const crmOutputEl = document.getElementById("crmOutput");
const remoteAudioEl = document.getElementById("remoteAudio");

let pc = null;
let dc = null;
let localStream = null;
let autoMode = false;
let micEnabled = true;
let analyser = null;
let audioCtx = null;
let sourceNode = null;
let mouthLevel = 0;
let connected = false;
let lastLeadId = null;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function setStatus(t){ statusEl.innerText = t; }

function renderJson(el, data){
  el.textContent = JSON.stringify(data, null, 2);
}

function drawFace(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width / 2;
  const eyeY = canvas.height * 0.45;
  const mouthY = canvas.height * 0.65;

  const blink = Math.random() > 0.986 ? 2 : 12;

  ctx.fillStyle = "white";
  ctx.fillRect(cx - 80, eyeY, 20, blink);
  ctx.fillRect(cx + 60, eyeY, 20, blink);

  ctx.fillStyle = "#00ffc8";
  ctx.beginPath();
  const mouthHeight = Math.max(8, mouthLevel * 90);
  ctx.ellipse(cx, mouthY, 95, mouthHeight, 0, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(drawFace);
}
drawFace();

async function testStatus(){
  try{
    const r = await fetch(API_BASE + "/v1/status");
    const j = await r.json();
    setStatus(j.ok ? "API OK" : "API ERROR");
    renderJson(crmOutputEl, j);
  }catch(e){
    setStatus("API ERROR");
    crmOutputEl.textContent = String(e);
  }
}

async function refreshOwnerPanel(){
  try{
    const dashRes = await fetch(API_BASE + "/v1/owner/dashboard");
    const dash = await dashRes.json();

    ownerStatsEl.innerText =
      `Automations: ${dash.stats.automations_total} | KV: ${dash.stats.automation_kv} | Realtime: ${dash.stats.realtime_ready} | Leads: ${dash.stats.leads_total ?? "-"}`;

    const listRes = await fetch(API_BASE + "/v1/automation/list");
    const list = await listRes.json();

    automationListEl.innerHTML = "";
    (list.items || []).slice(0, 20).forEach(item => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div><strong>${item.action}</strong></div>
        <div style="font-size:12px;opacity:.8;">${new Date(item.created_at).toLocaleString()}</div>
        <pre>${JSON.stringify(item.output || {}, null, 2)}</pre>
      `;
      automationListEl.appendChild(div);
    });

    await listarLeads(true);
  }catch(e){
    ownerStatsEl.innerText = "Panel error";
    crmOutputEl.textContent = String(e);
  }
}

async function runQuickAction(action){
  let payload = {};

  if (action === "task_create") {
    payload = { title: "Nueva tarea OWNER desde panel" };
  } else if (action === "followup_create") {
    payload = { channel: "whatsapp" };
  } else if (action === "lead_qualify") {
    payload = { budget: true, intent: "buy_now" };
  } else if (action === "property_match") {
    payload = { zone: "Posadas", type: "departamento" };
  } else if (action === "meeting_summary") {
    payload = { meeting: "owner panel" };
  }

  const res = await fetch(API_BASE + "/v1/automation/dispatch", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ action, payload })
  });

  const data = await res.json();
  renderJson(crmOutputEl, data);
  refreshOwnerPanel();
}

async function crearLeadTest(){
  const res = await fetch(API_BASE + "/v1/crm/lead/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: "Juan Pérez",
      phone: "3764123456",
      email: "juan@mail.com",
      source: "web"
    })
  });

  const data = await res.json();
  if (data?.lead?.id) lastLeadId = data.lead.id;
  renderJson(crmOutputEl, data);
  refreshOwnerPanel();
}

async function listarLeads(silent=false){
  const res = await fetch(API_BASE + "/v1/crm/lead/list");
  const data = await res.json();

  leadsListEl.innerHTML = "";
  (data.leads || []).slice(0, 20).forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div><strong>${item.name}</strong></div>
      <div style="font-size:12px;opacity:.8;">${item.email} | ${item.phone}</div>
      <div style="font-size:12px;">status: ${item.status}</div>
      <div style="font-size:12px;">id: ${item.id}</div>
    `;
    leadsListEl.appendChild(div);
  });

  if (!silent) renderJson(crmOutputEl, data);

  if (data.leads && data.leads.length > 0) {
    lastLeadId = data.leads[0].id;
  }
}

async function verPipeline(){
  const res = await fetch(API_BASE + "/v1/crm/pipeline");
  const data = await res.json();
  renderJson(crmOutputEl, data);
}

async function crearFollowupTest(){
  if (!lastLeadId) {
    await listarLeads(true);
  }

  if (!lastLeadId) {
    crmOutputEl.textContent = "No hay lead disponible para followup";
    return;
  }

  const res = await fetch(API_BASE + "/v1/crm/followup", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      lead_id: lastLeadId,
      message: "Seguimiento automático OWNER PANEL"
    })
  });

  const data = await res.json();
  renderJson(crmOutputEl, data);
}

async function connectRealtime(){
  if (connected) return;
  setStatus("CONNECTING...");

  try{
    const sessionRes = await fetch(API_BASE + "/v1/realtime/session", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({})
    });

    const sessionData = await sessionRes.json();
    if (!sessionRes.ok || !sessionData.ok) {
      setStatus("SESSION ERROR");
      renderJson(crmOutputEl, sessionData);
      return;
    }

    const ephemeralKey = sessionData.client_secret.value;
    const model = sessionData.model;

    pc = new RTCPeerConnection();
    dc = pc.createDataChannel("oai-events");

    dc.onopen = () => {
      connected = true;
      setStatus("CONNECTED");
    };

    dc.onmessage = async (ev) => {
      try{
        const event = JSON.parse(ev.data);

        if (event.type === "response.output_item.done" && event.item?.type === "function_call" && event.item?.name === "run_agent_action") {
          const args = JSON.parse(event.item.arguments || "{}");

          const toolRes = await fetch(API_BASE + "/v1/automation/dispatch", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              action: args.action,
              payload: args.payload || {}
            })
          });

          const toolData = await toolRes.json();

          dc.send(JSON.stringify({
            type: "conversation.item.create",
            item: {
              type: "function_call_output",
              call_id: event.item.call_id,
              output: JSON.stringify(toolData)
            }
          }));

          dc.send(JSON.stringify({ type: "response.create" }));
          refreshOwnerPanel();
        }
      }catch{}
    };

    pc.ontrack = (event) => {
      remoteAudioEl.srcObject = event.streams[0];
      setupAudioAnalyser(event.streams[0]);
      setStatus("SPEAKING READY");
    };

    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    for (const track of localStream.getTracks()) {
      track.enabled = micEnabled;
      pc.addTrack(track, localStream);
    }

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const sdpRes = await fetch(`https://api.openai.com/v1/realtime?model=${encodeURIComponent(model)}`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${ephemeralKey}`,
        "Content-Type": "application/sdp"
      },
      body: offer.sdp
    });

    const answer = {
      type: "answer",
      sdp: await sdpRes.text()
    };

    await pc.setRemoteDescription(answer);
    setStatus("CONNECTED");
  }catch(e){
    setStatus("CONNECT ERROR");
    crmOutputEl.textContent = String(e);
  }
}

function setupAudioAnalyser(stream){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    sourceNode.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);
    function tick(){
      if (analyser){
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a,b)=>a+b,0) / data.length;
        mouthLevel = Math.max(0.08, avg / 255);
      } else {
        mouthLevel = 0;
      }
      requestAnimationFrame(tick);
    }
    tick();
  }catch{}
}

function sendText(){
  if (!dc || dc.readyState !== "open") {
    setStatus("NOT CONNECTED");
    return;
  }

  const text = msgEl.value.trim();
  if (!text) return;

  dc.send(JSON.stringify({
    type: "conversation.item.create",
    item: {
      type: "message",
      role: "user",
      content: [{ type: "input_text", text }]
    }
  }));

  dc.send(JSON.stringify({ type: "response.create" }));
  msgEl.value = "";
  setStatus("TEXT SENT");
}

function toggleMic(){
  micEnabled = !micEnabled;
  if (localStream){
    for (const track of localStream.getAudioTracks()) {
      track.enabled = micEnabled;
    }
  }
  setStatus(micEnabled ? "MIC ON" : "MIC OFF");
}

function toggleAuto(){
  autoMode = !autoMode;
  setStatus(autoMode ? "AUTO ON" : "AUTO OFF");
}

function disconnectRealtime(){
  connected = false;
  mouthLevel = 0;
  if (dc) { try{ dc.close(); }catch{} dc = null; }
  if (pc) { try{ pc.close(); }catch{} pc = null; }
  if (localStream) {
    for (const t of localStream.getTracks()) t.stop();
    localStream = null;
  }
  if (sourceNode) { try{ sourceNode.disconnect(); }catch{} sourceNode = null; }
  if (analyser) { try{ analyser.disconnect(); }catch{} analyser = null; }
  remoteAudioEl.srcObject = null;
  setStatus("READY");
}

refreshOwnerPanel();
</script>

</body>
</html>
