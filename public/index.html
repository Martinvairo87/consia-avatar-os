<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA AVATAR PRO</title>

<style>
body{
  margin:0;
  background:#000;
  color:#00ffc8;
  font-family:monospace;
  text-align:center;
}
canvas{
  margin-top:40px;
  background:#001f1b;
  border-radius:20px;
  box-shadow:0 0 30px #00ffc844;
}
input{
  width:80%;
  padding:12px;
  margin:8px;
  background:#001f1b;
  border:1px solid #00ffc8;
  color:#00ffc8;
  border-radius:8px;
}
button{
  padding:12px 16px;
  margin:6px;
  background:#00ffc8;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
#status{margin-top:10px}
#log{
  margin:10px auto;
  width:80%;
  height:140px;
  overflow:auto;
  background:#001f1b;
  border-radius:8px;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<canvas id="avatar" width="300" height="300"></canvas>

<div id="status">READY</div>

<input id="api" value="https://consia-api.jbdkb7r94d.workers.dev">
<input id="msg" placeholder="Decime algo...">

<br>
<button onclick="send()">🚀 ENVIAR</button>
<button onclick="mic()">🎤 HABLAR</button>
<button onclick="autoMode()">🧠 AUTO</button>
<button onclick="test()">⚡ TEST</button>

<div id="log"></div>

<script>
// =====================
// CORE UI
// =====================
function api(){ return document.getElementById("api").value; }
function log(t){
  const el = document.getElementById("log");
  el.innerHTML += t + "<br>";
  el.scrollTop = el.scrollHeight;
}
function setStatus(t){ document.getElementById("status").innerText = t; }

// =====================
// AVATAR CANVAS
// =====================
const canvas = document.getElementById("avatar");
const ctx = canvas.getContext("2d");
let mouth = "S";

function draw(){
  ctx.clearRect(0,0,300,300);

  // cabeza
  ctx.fillStyle = "#00ffc8";
  ctx.beginPath();
  ctx.arc(150,150,120,0,Math.PI*2);
  ctx.fill();

  // ojos
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(110,120,10,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(190,120,10,0,Math.PI*2); ctx.fill();

  // boca segun visema
  ctx.fillStyle = "#000";
  ctx.beginPath();

  if(mouth==="A") ctx.ellipse(150,200,30,20,0,0,Math.PI*2);
  else if(mouth==="E") ctx.ellipse(150,200,35,10,0,0,Math.PI*2);
  else if(mouth==="I") ctx.ellipse(150,200,10,25,0,0,Math.PI*2);
  else if(mouth==="O") ctx.ellipse(150,200,20,20,0,0,Math.PI*2);
  else if(mouth==="U") ctx.ellipse(150,200,15,18,0,0,Math.PI*2);
  else if(mouth==="M") ctx.rect(120,190,60,10);
  else if(mouth==="F") ctx.rect(120,195,60,6);
  else ctx.rect(120,195,60,8);

  ctx.fill();
}

setInterval(draw, 30);

// =====================
// MOTOR VOZ CONSIA (WebAudio)
// =====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function speak(text, visemes){
  // síntesis simple propia (beep modulation)
  let t = audioCtx.currentTime;

  visemes.forEach((v,i)=>{
    setTimeout(()=> mouth = v, i*80);

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 180 + (v.charCodeAt(0)%5)*40;

    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.07);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(t);
    osc.stop(t+0.08);

    t += 0.08;
  });

  setTimeout(()=> mouth="S", visemes.length*80);
}

// =====================
// API
// =====================
async function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  setStatus("THINKING...");
  log("YOU: " + msg);

  try{
    const r = await fetch(api()+"/v1/realtime/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message: msg })
    });

    const j = await r.json();

    log("CONSIA: " + j.reply);

    speak(j.reply, j.visemes);

    setStatus("READY");

  }catch(e){
    setStatus("ERROR");
    log("ERROR " + e);
  }
}

// =====================
// MIC INPUT
// =====================
function mic(){
  const r = new webkitSpeechRecognition();
  r.lang="es-AR";

  r.onresult = (e)=>{
    const t = e.results[0][0].transcript;
    document.getElementById("msg").value = t;
    send();
  };

  r.start();
}

// =====================
// AUTO MODE (loop)
// =====================
let auto=false;

function autoMode(){
  if(auto) return;
  auto = true;

  function loop(){
    if(!auto) return;

    const r = new webkitSpeechRecognition();
    r.lang="es-AR";

    r.onresult = (e)=>{
      const t = e.results[0][0].transcript;
      document.getElementById("msg").value = t;
      send();
    };

    r.onend = ()=> setTimeout(loop, 400);
    r.start();
  }

  loop();
}

// =====================
// TEST
// =====================
async function test(){
  try{
    const r = await fetch(api()+"/v1/status");
    const j = await r.json();
    log("STATUS OK");
    setStatus("API OK");
  }catch(e){
    log("ERROR "+e);
  }
}
</script>

</body>
</html>
