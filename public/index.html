<!DOCTYPE html>
<html>
<head>
  <title>CONSIA AVATAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      margin:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }
    video {
      width:100%;
      height:100%;
      object-fit:cover;
    }
    button {
      position:absolute;
      bottom:40px;
      padding:15px 30px;
      font-size:18px;
      background:#00ffc8;
      border:none;
      border-radius:12px;
      color:black;
    }
  </style>
</head>
<body>

<video autoplay muted loop>
  <source src="https://create-images-results.d-id.com/DefaultPresenters/Noelle.mp4" type="video/mp4">
</video>

<button onclick="hablar()">Hablar</button>

<script>
async function hablar() {

  const text = prompt("CONSIA:");

  if (!text) return;

  const audio = new Audio(`https://consia-api.jbdkb7r94d.workers.dev/v1/tts?text=${encodeURIComponent(text)}`);

  audio.play();

}
</script>

</body>
</html>
