<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA CORE PRO</title>

<style>
body{
  margin:0;
  background:#000;
  color:#00ffc8;
  font-family:monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  text-align:center;
  width:90%;
  max-width:600px;
}

.circle{
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffc8,#002f2a);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  transition:0.2s;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#001f1b;
  border:1px solid #00ffc8;
  color:#00ffc8;
  border-radius:8px;
}

button{
  margin:5px;
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#00ffc8;
  color:#000;
  font-weight:bold;
}

.log{
  margin-top:15px;
  padding:10px;
  background:#001f1b;
  border-radius:8px;
  height:150px;
  overflow:auto;
  font-size:12px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">

<div class="circle" id="avatar">CONSIA</div>

<div id="status">READY</div>

<input id="api" value="https://consia-api.jbdkb7r94d.workers.dev">
<input id="msg" placeholder="Hablá con CONSIA...">

<div>
<button onclick="hablar()">🎤 HABLAR</button>
<button onclick="enviar()">🚀 ENVIAR</button>
<button onclick="autoListen()">🧠 AUTO</button>
<button onclick="test()">⚡ TEST</button>
</div>

<div class="log" id="log"></div>

</div>

<script>

// =====================
// CORE
// =====================
function api(){
  return document.getElementById("api").value;
}

function log(t){
  document.getElementById("log").innerHTML += t+"<br>";
}

function setStatus(t){
  document.getElementById("status").innerText = t;
}

// =====================
// VOZ CONSIA
// =====================
function speak(text){

  if(speechSynthesis.speaking){
    speechSynthesis.cancel();
  }

  let u = new SpeechSynthesisUtterance(text);

  u.lang = "es-AR";
  u.rate = 1;
  u.pitch = 1;

  let voices = speechSynthesis.getVoices();
  let v = voices.find(x=>x.lang.includes("es"));

  if(v) u.voice = v;

  speechSynthesis.speak(u);

  animateTalking();
}

// =====================
// ANIMACIÓN
// =====================
function animateTalking(){
  let a = document.getElementById("avatar");

  let i = setInterval(()=>{
    a.style.transform = "scale(" + (1 + Math.random()*0.08) + ")";
  },100);

  setTimeout(()=>{
    clearInterval(i);
    a.style.transform="scale(1)";
  },2000);
}

// =====================
// TEST API
// =====================
async function test(){
  try{
    let r = await fetch(api()+"/v1/status");
    let j = await r.json();
    setStatus("API OK");
    log("STATUS OK");
  }catch(e){
    setStatus("ERROR");
    log("ERROR "+e);
  }
}

// =====================
// ENVIAR
// =====================
async function enviar(){

  let msg = document.getElementById("msg").value;
  if(!msg) return;

  setStatus("THINKING...");
  log("YOU: "+msg);

  try{
    let r = await fetch(api()+"/v1/realtime/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    let j = await r.json();

    log("CONSIA: "+j.reply);

    speak(j.reply);

    setStatus("READY");

  }catch(e){
    setStatus("ERROR");
    log("ERROR "+e);
  }
}

// =====================
// VOZ INPUT
// =====================
function hablar(){

  let r = new webkitSpeechRecognition();
  r.lang="es-AR";

  r.onstart = ()=> setStatus("LISTENING...");

  r.onresult = (e)=>{
    let t = e.results[0][0].transcript;
    document.getElementById("msg").value = t;
    enviar();
  };

  r.onend = ()=> setStatus("READY");

  r.start();
}

// =====================
// AUTO LOOP (CONSIA LIVE)
// =====================
let listening = false;

function autoListen(){

  if(listening) return;

  listening = true;

  let r = new webkitSpeechRecognition();
  r.lang="es-AR";

  r.onresult = (e)=>{
    let t = e.results[0][0].transcript;
    document.getElementById("msg").value = t;
    enviar();
  };

  r.onend = ()=>{
    listening = false;
    setTimeout(autoListen, 400);
  };

  r.start();
}

</script>

</body>
</html>
